<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} &middot; {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <!-- GitHub Pages serves static files only and doesn't allow custom HTTP response headers,
       so the policy below is delivered as a <meta> tag instead of a Content-Security-Policy
       header. It still blocks inline/external script injection and restricts where this page
       can load resources from or be framed by. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https://images.unsplash.com data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/projects/' | relative_url }}">Projects</a>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
      </nav>
    </div>
  </header>

  <main class="panel">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.author }} &middot;
      <a href="mailto:{{ site.email }}">{{ site.email }}</a> &middot;
      <a href="https://github.com/{{ site.github_username }}">github.com/{{ site.github_username }}</a>
    </p>
  </footer>
</body>
</html>
